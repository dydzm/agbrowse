<!doctype html>
<html>
  <body data-provider="chatgpt" data-variant="baseline">
    <main aria-label="ChatGPT">
      <textarea data-eval-intent="composer.fill" data-eval-ref="chatgpt-composer">Ask anything</textarea>
      <button data-eval-intent="upload.open" data-eval-ref="chatgpt-upload">Attach</button>
      <button data-eval-intent="send.click" data-eval-ref="chatgpt-send">Send</button>
      <button data-eval-intent="copy.click" data-eval-ref="chatgpt-copy">Copy</button>
      <p>CHATGPT_BASELINE_OK</p>
    </main>
  </body>
</html>
