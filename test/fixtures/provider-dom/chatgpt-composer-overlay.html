<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>ChatGPT Mock Overlay</title></head>
<body>
  <main>
    <div id="composer-container">
      <textarea id="prompt-textarea" placeholder="Message ChatGPT" aria-label="Message ChatGPT"></textarea>
      <div id="overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)"></div>
      <button id="send-button" aria-label="Send message">Send</button>
    </div>
  </main>
</body>
</html>
