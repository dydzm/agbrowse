 <!doctype html>
 <html lang="en">
   <head>
     <meta charset="utf-8">
     <title>Sanitized ChatGPT GPT-5.6 Chat picker fixture</title>
   </head>
   <body data-provider="chatgpt" data-variant="gpt56-chat">
     <header>
       <div role="radiogroup" aria-label="Composer surface">
         <button
           type="button"
           role="radio"
           aria-checked="true"
           data-state="on"
           data-radix-collection-item
           data-eval-key="surface.chat"
           data-eval-label="Chat"
         >Chat</button>
         <button
           type="button"
           role="radio"
           aria-checked="false"
           data-state="off"
           data-radix-collection-item
           data-eval-key="surface.work"
           data-eval-label="Work"
         >Work</button>
       </div>
     </header>

     <main aria-label="ChatGPT">
       <form aria-label="Prompt composer" data-eval-key="chat.composer">
         <button
           type="button"
           aria-haspopup="menu"
           aria-expanded="true"
           aria-controls="fixture-chat-intelligence-menu"
           data-eval-key="chat.picker-trigger"
           data-eval-label="High"
         >High</button>
         <div
           role="textbox"
           contenteditable="true"
           aria-label="Message ChatGPT"
           data-eval-intent="composer.fill"
           data-eval-ref="chatgpt-gpt56-chat-composer"
         ></div>
         <button
           type="button"
           aria-label="Add photos and files"
           data-testid="composer-plus-btn"
           data-eval-intent="upload.open"
           data-eval-ref="chatgpt-gpt56-chat-upload"
         >Add</button>
         <button
           type="submit"
           aria-label="Send prompt"
           data-eval-intent="send.click"
           data-eval-ref="chatgpt-gpt56-chat-send"
         >Send</button>
       </form>

       <div id="fixture-chat-intelligence-menu" role="menu" data-state="open">
         <div
           role="group"
           aria-labelledby="fixture-chat-intelligence-heading"
           data-testid="composer-intelligence-picker-content"
           data-eval-key="chat.intelligence-group"
         >
           <div id="fixture-chat-intelligence-heading" role="presentation">Intelligence</div>
           <div
             role="menuitemradio"
             aria-checked="false"
             data-state="unchecked"
             tabindex="-1"
             data-eval-key="chat.tier.instant"
             data-eval-label="Instant"
             data-eval-tier="instant"
           ><span>Instant</span><span>5.5</span></div>
           <div
             role="menuitemradio"
             aria-checked="false"
             data-state="unchecked"
             tabindex="-1"
             data-eval-key="chat.tier.medium"
             data-eval-label="Medium"
             data-eval-tier="medium"
           ><span>Medium</span></div>
           <div
             role="menuitemradio"
             aria-checked="true"
             data-state="checked"
             tabindex="0"
             data-eval-key="chat.tier.high"
             data-eval-label="High"
             data-eval-tier="high"
           ><span>High</span></div>
           <div
             role="menuitemradio"
             aria-checked="false"
             data-state="unchecked"
             tabindex="-1"
             data-eval-key="chat.tier.extra-high"
             data-eval-label="Extra High"
             data-eval-tier="extra-high"
           ><span>Extra High</span></div>
           <div
             role="menuitemradio"
             aria-checked="false"
             data-state="unchecked"
             tabindex="-1"
             data-eval-key="chat.tier.pro"
             data-eval-label="Pro"
             data-eval-tier="pro"
           ><span>Pro</span></div>

           <div role="separator"></div>
           <div
             role="menuitem"
             aria-haspopup="menu"
             data-has-submenu
             tabindex="-1"
             data-eval-key="chat.family-trigger"
             data-eval-label="GPT-5.6 Sol"
           >
             <span>GPT-5.6 Sol</span>
             <svg
               aria-hidden="true"
               data-testid="menu-item-submenu-chevron"
               viewBox="0 0 16 16"
               width="16"
               height="16"
            ><path d="M6,3.5L10.5,8L6,12.5"></path></svg>
           </div>
         </div>
       </div>

       <template data-eval-state="family-submenu-open">
         <div role="menu" data-state="open" data-eval-key="chat.family-submenu">
           <div role="menuitemradio" aria-checked="true" data-eval-key="chat.family.gpt-5.6-sol" data-eval-label="GPT-5.6 Sol"><span>GPT-5.6 Sol</span></div>
           <div role="menuitemradio" aria-checked="false" data-eval-key="chat.family.gpt-5.5" data-eval-label="GPT-5.5"><span>GPT-5.5</span></div>
           <div role="menuitemradio" aria-checked="false" data-eval-key="chat.family.gpt-5.4" data-eval-label="GPT-5.4"><span>GPT-5.4</span><span>Leaving on July 23</span></div>
           <div role="menuitemradio" aria-checked="false" data-eval-key="chat.family.gpt-5.3" data-eval-label="GPT-5.3"><span>GPT-5.3</span></div>
           <div role="menuitemradio" aria-checked="false" data-eval-key="chat.family.o3" data-eval-label="o3"><span>o3</span></div>
         </div>
       </template>
     </main>
   </body>
 </html>
